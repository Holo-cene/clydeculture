# CI — unit/fixture checks
#
# What this workflow runs:
#   install · unit and fixture tests · typecheck · lint · Astro build
#
# What is intentionally deferred from this workflow:
#   supabase db reset  — requires a live local Supabase instance
#   supabase db test   — pgTAP tests run against the local Supabase stack
#   Integration tests  — packages/core/**/*.integration.test.ts require
#                        SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_ANON_KEY
#                        and are excluded from `pnpm test` via vitest.config.ts
#
# Full local validation sequence (run before merging to main):
#   supabase start && supabase db reset && supabase db test
#   pnpm test
#   pnpm typecheck
#   pnpm lint
#   pnpm --filter @clydeculture/web build
#   See docs/TESTING.md and docs/DEVELOPMENT_WORKFLOW.md for details.
#
# No live credentials are used. No live third-party API calls are made.

name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Reads pnpm version from the packageManager field in package.json (pnpm@9)

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Astro build
        # PUBLIC_* env vars are inlined at build time by Vite. All pages use
        # output: 'server' with prerender: false, so no Supabase calls happen
        # at build time — placeholder values are safe here.
        run: pnpm --filter @clydeculture/web build
        env:
          PUBLIC_SUPABASE_URL: http://localhost:54321
          PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build-only
